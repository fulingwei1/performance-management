name: Backend CI

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: performance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: TypeScript compile
        working-directory: backend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: backend
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/performance_test
          JWT_SECRET: ci-test-secret
          NODE_ENV: test

      - name: Check coverage threshold
        working-directory: backend
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json 2>/dev/null | node -e "
            const data = require('fs').readFileSync('/dev/stdin','utf8');
            const json = JSON.parse(data);
            console.log(json.total.lines.pct);
          " 2>/dev/null || echo "0")
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 60" | bc -l 2>/dev/null || echo 1) )); then
            echo "::warning::Coverage ${COVERAGE}% is below 60% threshold"
          fi
