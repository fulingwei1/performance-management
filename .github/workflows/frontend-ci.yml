name: Frontend CI

on:
  push:
    branches: [main]
    paths: ['app/**']
  pull_request:
    branches: [main]
    paths: ['app/**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Lint
        working-directory: app
        run: npm run lint

      - name: Run tests
        working-directory: app
        run: npm test -- --run

      - name: Build
        working-directory: app
        run: npm run build

      - name: Check bundle size
        working-directory: app
        run: |
          SIZE=$(du -sk dist/ | cut -f1)
          SIZE_MB=$(echo "scale=2; $SIZE/1024" | bc)
          echo "Bundle size: ${SIZE_MB}MB"
          if (( $(echo "$SIZE > 3072" | bc -l) )); then
            echo "::error::Bundle size ${SIZE_MB}MB exceeds 3MB limit"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: app/dist/
          retention-days: 7
